services:

  frontend:
    image: helios-frontend-dev
    container_name: helios-frontend-dev
    build:
      context: .
      dockerfile: frontend/dev.Dockerfile
    depends_on:
      - backend
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/frontend/node_modules

  backend:
    image: helios-backend-dev
    container_name: helios-backend-dev
    build:
      context: .
      dockerfile: backend/dev.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/backend/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  loader:
    image: helios-loader-dev
    build:
      context: .
      dockerfile: loader/dev.Dockerfile
    environment:
      HELIOS_URL: ${HELIOS_URL}
      DEMO_WORKER_ID: ${DEMO_WORKER_ID}
      DEMO_WORKER_SECRET: ${DEMO_WORKER_SECRET}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/loader/node_modules
    depends_on:
      - nginx

  nginx:
    image: nginx:latest
    container_name: helios-nginx-dev
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
